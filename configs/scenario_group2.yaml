network:
  base_stations:
    - id: BS1
    - id: BS2
    - id: BS3
    - id: BS4
    - id: BS5

  core_nodes:
    - id: CORE1
    - id: CORE2

  links:
    - from: BS1
      to: CORE1
      capacity_mbps: 100
      delay_ms: 5
    - from: BS2
      to: CORE1
      capacity_mbps: 100
      delay_ms: 6
    - from: BS3
      to: CORE2
      capacity_mbps: 100
      delay_ms: 7
    - from: BS4
      to: CORE2
      capacity_mbps: 100
      delay_ms: 5
    - from: BS5
      to: CORE1
      capacity_mbps: 100
      delay_ms: 8
    - from: CORE1
      to: CORE2
      capacity_mbps: 500
      delay_ms: 2

traffic_classes:
  - name: alarms_control
    offered_load: 20
    priority: 1
  - name: voice
    offered_load: 40
    priority: 2
  - name: video
    offered_load: 60
    priority: 3
  - name: bulk_data
    offered_load: 80
    priority: 4

wireless:
  frequency_mhz: 1800
  base_height_m: 30
  mobile_height_m: 1.5
  sample_distances_km: [0.5, 1, 2, 3, 5]

forecasting:
  annual_growth_rate: 0.15
  years: 3

failure:
  enabled: false
  failed_link:
    from: CORE1
    to: CORE2

kpi_targets:
  max_delay_ms_critical: 80
  max_packet_loss_percent: 2.5
  min_throughput_mbps: 180
  min_site_availability_percent: 80