network:
  base_stations:
    - id: BS1
    - id: BS2
    - id: BS3
    - id: BS4
    - id: BS5

  core_nodes:
    - id: CORE1
    - id: CORE2

  links:
    - from: BS1
      to: CORE1
      capacity_mbps: 150
      delay_ms: 3

    - from: BS2
      to: CORE1
      capacity_mbps: 150
      delay_ms: 4

    - from: BS3
      to: CORE2
      capacity_mbps: 150
      delay_ms: 3

    - from: BS4
      to: CORE2
      capacity_mbps: 150
      delay_ms: 2

    - from: BS5
      to: CORE1
      capacity_mbps: 150
      delay_ms: 4

    - from: BS1
      to: CORE2
      capacity_mbps: 80
      delay_ms: 6

    - from: BS2
      to: CORE2
      capacity_mbps: 80
      delay_ms: 7

    - from: BS3
      to: CORE1
      capacity_mbps: 80
      delay_ms: 6

    - from: BS4
      to: CORE1
      capacity_mbps: 80
      delay_ms: 5

    - from: BS5
      to: CORE2
      capacity_mbps: 80
      delay_ms: 7

    - from: CORE1
      to: CORE2
      capacity_mbps: 1000
      delay_ms: 1

traffic_classes:
  - name: alarms_control
    offered_load: 3
    priority: 1

  - name: voice
    offered_load: 6
    priority: 2

  - name: video
    offered_load: 10
    priority: 3

  - name: bulk_data
    offered_load: 14
    priority: 4

wireless:
  frequency_mhz: 1800
  base_height_m: 30
  mobile_height_m: 1.5
  sample_distances_km: [0.5, 1, 2, 3, 5]

forecasting:
  annual_growth_rate: 0.12
  years: 3